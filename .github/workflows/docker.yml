# Builds and publishes the load balancer's container image on pushes to main.
name: docker
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          build-args: |
            INTERFACES_REF=bbd8b52ce729ec34b0a9bff4dda6d0a448181797
            ROUTING_REF=f0c86c2736b61cf3af7fa298a092fa435069cd64
          tags: |
            ghcr.io/fiducia-cloud/fiducia-load-balance:latest
            ghcr.io/fiducia-cloud/fiducia-load-balance:${{ github.sha }}
