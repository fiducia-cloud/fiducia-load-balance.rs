# Secret-gated deploy to the TEST environment.
#
# Required secrets (repo Settings -> Secrets and variables -> Actions):
#   KUBE_CONFIG_TEST  base64-encoded kubeconfig with access to the `fiducia-test`
#                     namespace. Missing or blank credentials fail the job.
#
# Topology: app repos deploy to the TEST environment from their own CI; the
# fiducia-monorepo is the only PROD deploy. This is the TEST half for this
# service -- it rolls the `fiducia-test` namespace deployment to the image
# tagged with this commit SHA (ghcr.io/fiducia-cloud/fiducia-load-balance:<sha>),
# built/pushed by docker.yml.
name: deploy-test

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: deploy to test
        env:
          KUBE_CONFIG_TEST: ${{ secrets.KUBE_CONFIG_TEST }}
        run: |
          set -euo pipefail
          if [ -z "${KUBE_CONFIG_TEST//[[:space:]]/}" ]; then
            echo "::error::KUBE_CONFIG_TEST must contain a base64-encoded kubeconfig"
            exit 1
          fi

          install -d -m 700 "$RUNNER_TEMP/fiducia-kube"
          export KUBECONFIG="$RUNNER_TEMP/fiducia-kube/config"
          install -m 600 /dev/null "$KUBECONFIG"
          printf '%s' "$KUBE_CONFIG_TEST" | base64 --decode | tee "$KUBECONFIG" >/dev/null
          if [ ! -s "$KUBECONFIG" ]; then
            echo "::error::KUBE_CONFIG_TEST decoded to an empty kubeconfig"
            exit 1
          fi

          kubectl -n fiducia-test set image deploy/fiducia-load-balance fiducia-load-balance=ghcr.io/fiducia-cloud/fiducia-load-balance:${{ github.sha }}
          kubectl -n fiducia-test rollout status deploy/fiducia-load-balance --timeout=5m
