# CI: builds, lints, and tests the load balancer on push/PR.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          path: repo
          submodules: recursive
      - uses: actions/checkout@v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/checkout@v7
        with:
          repository: fiducia-cloud/fiducia-routing.rs
          path: fiducia-routing.rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: repo
      - name: CLI flag contract
        working-directory: repo
        run: |
          make -B -C vendor/flags-2-env all
          vendor/flags-2-env/build/flags2env audit .cli-flags.toml
      - name: fmt
        working-directory: repo
        run: cargo fmt --check
        continue-on-error: true
      - name: clippy
        working-directory: repo
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
      - name: test
        working-directory: repo
        run: cargo test --bins $(cargo build --lib --quiet 2>/dev/null && echo --lib)
      - name: audit
        working-directory: repo
        run: |
          cargo install cargo-audit --locked || true
          cargo audit
        continue-on-error: true
