# Builds and publishes the load balancer's container image on pushes to main.
name: docker
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write # Required only to publish this commit-SHA image to GHCR.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          pull: true
          provenance: mode=max
          sbom: true
          build-args: |
            INTERFACES_REF=6e20a3f4df2e52b99a0ad6add83d4528262b5dbc
            ROUTING_REF=543b4ea3b3bba28b66c15a97a27514488d2ccce3
          tags: |
            ghcr.io/fiducia-cloud/fiducia-load-balance:${{ github.sha }}
